<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | NIVPL</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .thankyou-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cream);
      text-align: center;
      padding: 2rem;
    }
    .thankyou-box { max-width: 520px; }
    .thankyou-icon {
      font-size: 3rem;
      margin-bottom: 1.5rem;
    }
    .thankyou-box h1 {
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-weight: 400;
      color: var(--burgundy);
      margin-bottom: 1rem;
      line-height: 1.1;
    }
    .thankyou-box h1 em { font-style: italic; color: var(--gold); }
    .thankyou-box p {
      font-size: 0.95rem;
      color: var(--text-muted);
      font-weight: 300;
      line-height: 1.85;
      margin-bottom: 2rem;
    }
  </style>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="images/images/nivpl_white.png">
  <link rel="apple-touch-icon" href="images/images/nivpl_white.png">
  <meta name="theme-color" content="#6B1F2A">
  <!-- SEO -->
  <meta name="description" content="Thank you for contacting NIVPL. We will be in touch shortly.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://nivpl.com/thank-you.html">
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="NIVPL">
  <meta property="og:title" content="Thank You | NIVPL">
  <meta property="og:description" content="Thank you for contacting NIVPL. We will be in touch shortly.">
  <meta property="og:image" content="https://nivpl.com/images/niyaaz-abt.jpg">
  <meta property="og:url" content="https://nivpl.com/thank-you.html">
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Thank You | NIVPL">
  <meta name="twitter:description" content="Thank you for contacting NIVPL. We will be in touch shortly.">
  <meta name="twitter:image" content="https://nivpl.com/images/niyaaz-abt.jpg">
</head>
<body>
  <div class="thankyou-wrap">
    <div class="thankyou-box">
      <div class="thankyou-icon">✉️</div>
      <h1>Message <em>received.</em></h1>
      <p>Thank you for reaching out to NIVPL. We have received your message and will get back to you within one business day.</p>
      <a href="index.html" class="btn-primary">Back to Home</a>
    </div>
  </div>
  <script src="js/animations.js"></script>
</body>
</html>
